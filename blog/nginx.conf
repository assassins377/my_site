# Nginx конфигурация для блога
# Размещение: /etc/nginx/sites-available/blog или включить в основной конфиг

server {
    listen 80;
    server_name localhost;
    
    # Корневая директория - только public/
    root /var/www/blog/public;
    index index.php;

    # Логирование
    access_log /var/www/blog/logs/access.log;
    error_log /var/www/blog/logs/error.log;

    # Gzip сжатие
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json;

    # Безопасность заголовков
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Запрет доступа к скрытым файлам
    location ~ /\. {
        deny all;
        return 404;
    }

    # Запрет выполнения скриптов в uploads
    location ~* ^/uploads/.*\.(php|php5|phtml)$ {
        deny all;
        return 404;
    }

    # Кэширование статики (30 дней)
    location ~* \.(jpg|jpeg|png|gif|ico|webp|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Основной маршрут - роутинг через index.php
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Обработка PHP через FastCGI
    location ~ \.php$ {
        fastcgi_pass unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Переменные окружения
        fastcgi_param PHP_VALUE "upload_max_filesize=10M \n post_max_size=10M";
    }

    # Защита torrent файлов (вне public/, но если вдруг попадут)
    location ~* \.torrent$ {
        deny all;
        return 404;
    }

    # Sitemap и RSS
    location = /sitemap.xml {
        try_files $uri /index.php?$query_string;
    }

    location = /feed.xml {
        try_files $uri /index.php?$query_string;
    }
}
